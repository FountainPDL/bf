apply plugin: 'com.android.application'

android {
    namespace 'com.fountainpdl.blockfront'
    compileSdk 34

    defaultConfig {
        applicationId "com.fountainpdl.blockfront"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "0.1.0-alpha"
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // No androidx.appcompat — we don't use any AppCompat-only features,
    // and it was dragging in a conflicting kotlin-stdlib version.
}
